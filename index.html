<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ducky Dungeons</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Courier New', monospace; }
  #wrap { position: relative; }
  canvas { display: block; image-rendering: pixelated; }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.82);
    color: #fff;
    pointer-events: all;
  }
  #overlay h1 { font-size: 38px; color: #5dfc6e; text-shadow: 2px 2px 0 #1a4a1e, 0 0 20px #5dfc6e; margin-bottom: 8px; letter-spacing: 2px; }
  #overlay h2 { font-size: 22px; color: #ffcc44; text-shadow: 1px 1px 0 #664400; margin-bottom: 16px; }
  #overlay p  { font-size: 13px; color: #aaa; margin: 3px 0; }
  #profiles { width: 340px; margin: 14px 0 4px; }
  .profile-bar {
    margin: 6px 0; padding: 8px 12px; border: 2px solid #444;
    background: #111; cursor: pointer; position: relative; overflow: hidden;
    transition: border-color 0.2s; min-height: 42px; isolation: isolate;
  }
  .profile-bar:hover { border-color: #888; }
  .profile-bar.active { border-color: #5dfc6e; background: #0a1a0a; }
  .profile-bar-fill { position: absolute; top:0; left:0; height:100%; opacity:0.15; transition: width 0.6s ease; }
  .profile-info { position: relative; display: flex; justify-content: space-between; align-items: center; font-family: 'Courier New', monospace; }
  .profile-name { font-weight: bold; color: #fff; font-size: 14px; min-width: 60px; }
  .profile-stats { font-size: 11px; color: #ddd; text-align: right; line-height: 1.6; }
  #overlay .btn {
    margin-top: 28px; padding: 12px 36px; font-size: 18px; font-family: inherit;
    background: #2a6e2a; color: #fff; border: 2px solid #5dfc6e;
    cursor: pointer; letter-spacing: 1px;
  }
  #overlay .btn:hover { background: #3a9e3a; }
  #overlay.hidden { display: none; }
  #deathMsg { font-size: 16px; color: #ff4444; margin-bottom: 10px; }
  #winMsg   { font-size: 16px; color: #ffd700; margin-bottom: 10px; }
  #difficulty-select { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 4px; justify-content: center; }
  .diff-btn {
    flex: 1; padding: 8px 0; font-family: 'Courier New', monospace; font-size: 13px;
    border: 2px solid #555; background: #111; color: #aaa; cursor: pointer; letter-spacing: 1px;
    transition: all 0.15s;
  }
  .diff-btn:hover { border-color: #888; color: #fff; }
  .diff-btn.active-easy    { border-color: #44cc44; background: #0a200a; color: #44ff44; }
  .diff-btn.active-adventure { border-color: #ffcc44; background: #201a00; color: #ffcc44; }
  .diff-btn.active-hardcore    { border-color: #ff4444; background: #200000; color: #ff6666; }
  .diff-btn.active-impossible      { border-color: #ff00ff; background: #1a001a; color: #ff44ff; }
  .diff-btn.active-chaos_q  { border-color: #ff3300; background: #150500; color: #ff6622; text-shadow: 0 0 6px #ff3300, 0 0 14px #ff6600; animation: chaosQFlash 0.5s infinite alternate; }
  @keyframes chaosQFlash { from { color:#ff3300; border-color:#ff3300; } to { color:#ffaa44; border-color:#ff6600; } }
  .diff-btn.active-super_apocalypse{ border-color: #ff6600; background: #1a0800; color: #ff9933; text-shadow: 0 0 8px #ff6600; }
  .diff-btn.active-unknown  { border-color: #ffffff; background: #050505; color: #fff; letter-spacing: 4px; text-shadow: 0 0 10px #fff, 0 0 20px #aaaaff; }
  .diff-btn.active-chaos    { border-color: #ff0000; background: #0a0000; color: #ff0000; letter-spacing: 2px; text-shadow: 0 0 6px #ff0000, 0 0 16px #ff4400, 0 0 30px #ff0000; animation: chaosFlash 0.4s infinite alternate; }
  @keyframes chaosFlash { from { color:#ff0000; border-color:#ff0000; } to { color:#ffaa00; border-color:#ffaa00; } }
  .diff-btn.active-oblivion { border-color: #ff00ff; background: #0a000a; color: #ff00ff; letter-spacing: 3px; text-shadow: 0 0 8px #ff00ff, 0 0 20px #ff44ff, 0 0 40px #cc00cc, 0 0 60px #ff00ff; animation: oblivionFlash 0.25s infinite alternate; }
  @keyframes oblivionFlash { from { color:#ff00ff; border-color:#ff00ff; box-shadow:0 0 10px #ff00ff; } to { color:#ffffff; border-color:#ffffff; box-shadow:0 0 30px #ffffff; } }
  .diff-btn.active-godmode  { border-color: #ffff00; background: #0a0a00; color: #ffff00; letter-spacing: 4px; text-shadow: 0 0 10px #ffff00, 0 0 25px #ffffff, 0 0 50px #ffff00, 0 0 80px #ffaa00; animation: godFlash 0.15s infinite alternate; }
  @keyframes godFlash { from { color:#ffff00; border-color:#ffff00; box-shadow:0 0 15px #ffff00; } to { color:#ffffff; border-color:#ffffff; box-shadow:0 0 50px #ffffff, 0 0 80px #ffff00; } }

  /* On-screen controls */
  #onscreen-controls {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; display: none;
  }
  #onscreen-controls.visible { display: block; }
  .oc-dpad {
    position: absolute; bottom: 18px; left: 18px;
    width: 120px; height: 120px;
    display: grid; grid-template-columns: repeat(3,40px); grid-template-rows: repeat(3,40px);
    gap: 0;
  }
  .oc-btn {
    pointer-events: all;
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    color: #fff;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none;
    cursor: pointer;
    transition: background 0.07s;
  }
  .oc-btn:active, .oc-btn.pressed { background: rgba(255,255,255,0.38); }
  .oc-center { background: transparent; border-color: transparent; pointer-events: none; }
  .oc-attack {
    position: absolute; bottom: 28px; right: 28px;
    width: 72px; height: 72px;
    border-radius: 50%;
    background: rgba(220,50,50,0.55);
    border: 3px solid rgba(255,120,120,0.8);
    pointer-events: all;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: #fff;
    user-select: none; -webkit-user-select: none;
    cursor: pointer;
  }
  .oc-attack:active, .oc-attack.pressed { background: rgba(255,80,80,0.75); }
  .oc-bow {
    position: absolute; bottom: 112px; right: 36px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: rgba(80,140,220,0.55);
    border: 3px solid rgba(120,180,255,0.8);
    pointer-events: all;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: #fff;
    user-select: none; -webkit-user-select: none;
    cursor: pointer; overflow: hidden;
  }
  .oc-bow:active, .oc-bow.pressed { background: rgba(100,180,255,0.75); }
  .oc-heal {
    position: absolute; bottom: 200px; right: 36px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: rgba(30,180,80,0.55);
    border: 3px solid rgba(80,255,140,0.8);
    pointer-events: all;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: #fff;
    user-select: none; -webkit-user-select: none;
    cursor: pointer; overflow: hidden;
  }
  .oc-heal:active, .oc-heal.pressed { background: rgba(60,255,120,0.75); }
  #oc-heal-cd {
    position: absolute; inset: 0; border-radius: 50%;
    pointer-events: none; z-index: 2;
    transition: none;
  }
  .oc-bomb {
    position: absolute; bottom: 264px; right: 36px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: rgba(180,100,20,0.6);
    border: 3px solid rgba(255,180,60,0.9);
    pointer-events: all;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; color: #fff;
    user-select: none; -webkit-user-select: none;
    cursor: pointer; overflow: hidden;
  }
  .oc-bomb:active, .oc-bomb.pressed { background: rgba(255,140,20,0.8); }
  #oc-bomb-cd {
    position: absolute; inset: 0; border-radius: 50%;
    pointer-events: none; z-index: 2;
    transition: none;
  }
  #oc-bow-cd {
    position: absolute; inset: 0; border-radius: 50%;
    pointer-events: none; z-index: 2;
    transition: none;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="onscreen-controls">
    <div class="oc-dpad">
      <div class="oc-center"></div>
      <div class="oc-btn" id="oc-up">▲</div>
      <div class="oc-center"></div>
      <div class="oc-btn" id="oc-left">◀</div>
      <div class="oc-center"></div>
      <div class="oc-btn" id="oc-right">▶</div>
      <div class="oc-center"></div>
      <div class="oc-btn" id="oc-down">▼</div>
      <div class="oc-center"></div>
    </div>
    <div class="oc-attack" id="oc-attack">⚔</div>
    <div class="oc-bow" id="oc-bow">🏹<div id="oc-bow-cd"></div></div>
    <div class="oc-heal" id="oc-heal">💊<div id="oc-heal-cd"></div></div>
    <div class="oc-bomb" id="oc-bomb">💣<div id="oc-bomb-cd"></div></div>
  </div>
  <div id="overlay">
    <h1>DUCKY</h1>
    <h2>⚔ DUNGEONS ⚔</h2>
    <p>WASD — Move</p>
    <p>Mouse — Aim</p>
    <p>Left Click / Space — Melee Attack</p>
    <p>Right Click — Shoot Arrow</p>
    <p>E — Pick up item</p>
    <div id="profiles">
      <div class="profile-bar" id="prof0" onclick="window.selectProfile(0)">
        <div class="profile-bar-fill" id="pfill0" style="background:#5dfc6e;width:0%"></div>
        <div class="profile-info"><span class="profile-name">SLOT 1</span><span class="profile-stats" id="pstats0">BEATEN: 0&nbsp;&nbsp;BEST: --:--<br>RUNS: 0</span></div>
      </div>
      <div class="profile-bar" id="prof1" onclick="window.selectProfile(1)">
        <div class="profile-bar-fill" id="pfill1" style="background:#44aaff;width:0%"></div>
        <div class="profile-info"><span class="profile-name">SLOT 2</span><span class="profile-stats" id="pstats1">BEATEN: 0&nbsp;&nbsp;BEST: --:--<br>RUNS: 0</span></div>
      </div>
      <div class="profile-bar" id="prof2" onclick="window.selectProfile(2)">
        <div class="profile-bar-fill" id="pfill2" style="background:#ffaa22;width:0%"></div>
        <div class="profile-info"><span class="profile-name">SLOT 3</span><span class="profile-stats" id="pstats2">BEATEN: 0&nbsp;&nbsp;BEST: --:--<br>RUNS: 0</span></div>
      </div>
    </div>
    <div id="difficulty-select">
      <button class="diff-btn" id="diff-easy"      onclick="window.setDifficulty('easy')">EASY</button>
      <button class="diff-btn active-adventure" id="diff-adventure" onclick="window.setDifficulty('adventure')">ADVENTURE</button>
      <button class="diff-btn" id="diff-hardcore"    onclick="window.setDifficulty('hardcore')">HARDCORE</button>
      <button class="diff-btn" id="diff-impossible"       onclick="window.setDifficulty('impossible')">IMPOSSIBLE</button>
      <button class="diff-btn" id="diff-chaos_q"          onclick="window.setDifficulty('chaos_q')">CHAOS?</button>
      <button class="diff-btn" id="diff-super_apocalypse" onclick="window.setDifficulty('super_apocalypse')">SUPER APOCALYPSE</button>
      <button class="diff-btn" id="diff-unknown"          onclick="window.setDifficulty('unknown')">???</button>
      <button class="diff-btn" id="diff-chaos"            onclick="window.setDifficulty('chaos')">?!?!</button>
      <button class="diff-btn" id="diff-oblivion"         onclick="window.setDifficulty('oblivion')">?!!!</button>
      <button class="diff-btn" id="diff-godmode"          onclick="window.setDifficulty('godmode')">!!!!</button>
    </div>
    <p id="deathMsg"></p>
    <p id="winMsg"></p>
    <button class="btn" id="startBtn" onclick="window.startGame()">ENTER DUNGEON</button>
  </div>
</div>

<script>
'use strict';

// === CONSTANTS & CONFIG ===
const CW = 800, CH = 600;
const TILE = 32;
const cfg = {
  playerSpeed: 260,
  meleeRange: 2*32,             // 2 blocks reach
  meleeArc: Math.PI*2,         // 360 degree sweep
  arrowSpeed: 420,
  maxLevels: 5,
};

// === CANVAS SETUP ===
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
const wrap = document.getElementById('wrap');

function resize() {
  const scale = Math.min(window.innerWidth / CW, window.innerHeight / CH);
  canvas.width = CW; canvas.height = CH;
  canvas.style.width = (CW * scale) + 'px';
  canvas.style.height = (CH * scale) + 'px';
  wrap.style.width = (CW * scale) + 'px';
  wrap.style.height = (CH * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// === AUDIO ===
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playSound(freq, type, dur, slide=0, vol=0.25) {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type = type; osc.frequency.setValueAtTime(freq, ac.currentTime);
    if (slide) osc.frequency.linearRampToValueAtTime(freq + slide, ac.currentTime + dur);
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    osc.start(ac.currentTime); osc.stop(ac.currentTime + dur + 0.01);
  } catch(e){}
}
const SFX = {
  swing:   ()=>playSound(220,'sawtooth',0.12,-80,0.2),
  arrow:   ()=>playSound(380,'sawtooth',0.09,-180,0.15),
  hit:     ()=>playSound(160,'square',0.18,-50,0.25),
  die:     ()=>playSound(120,'square',0.3,-60,0.3),
  pickup:  ()=>playSound(520,'sine',0.18,200,0.2),
  door:    ()=>playSound(280,'sine',0.35,120,0.2),
  step:    ()=>playSound(90,'triangle',0.04,0,0.07),
  hurt:    ()=>playSound(180,'square',0.22,-40,0.3),
  level:   ()=>playSound(440,'sine',0.5,220,0.3),
};
let ambOsc=null, ambGain=null;
function startAmb(pitch=55) {
  try {
    const ac = getAudio();
    if (ambOsc) { try{ ambOsc.stop(); }catch(e){} }
    ambOsc = ac.createOscillator(); ambGain = ac.createGain();
    const lfo = ac.createOscillator(); const lfoG = ac.createGain();
    lfo.frequency.value=0.15; lfoG.gain.value=10;
    lfo.connect(lfoG); lfoG.connect(ambOsc.frequency);
    ambOsc.type='sawtooth'; ambOsc.frequency.value=pitch;
    ambGain.gain.value=0.06;
    ambOsc.connect(ambGain); ambGain.connect(ac.destination);
    lfo.start(); ambOsc.start();
  } catch(e){}
}

// === SPRITE GENERATOR ===
const sprites = {};
function makeSprite(id, w, h, fn) {
  const oc = document.createElement('canvas');
  oc.width=w; oc.height=h;
  const c = oc.getContext('2d');
  c.imageSmoothingEnabled=false;
  fn(c, w, h);
  sprites[id]=oc;
}

function px(c, col, x, y, s=2) {
  c.fillStyle=col; c.fillRect(x*s, y*s, s, s);
}

// Floor tile
makeSprite('floor', 32, 32, (c)=>{
  c.fillStyle='#4a4a5a'; c.fillRect(0,0,32,32);
  c.fillStyle='#3f3f4e'; c.fillRect(0,0,32,1); c.fillRect(0,0,1,32);
  c.fillStyle='#555566';
  [[2,8],[10,4],[20,14],[6,22],[24,6],[14,26],[28,18]].forEach(([x,y])=>{
    c.fillRect(x,y,3,2);
  });
});

// Wall tile
makeSprite('wall', 32, 32, (c)=>{
  c.fillStyle='#7a7a6a'; c.fillRect(0,0,32,32);
  c.fillStyle='#6a6a5a';
  for(let r=0;r<4;r++) for(let ci=0;ci<2;ci++) {
    const ox = (r%2===0)?0:16;
    c.fillRect(ox+ci*32, r*8+2, 14, 4);
  }
  c.fillStyle='#8a8a7a'; c.fillRect(0,0,32,2); c.fillRect(0,0,2,32);
  c.fillStyle='#555548'; c.fillRect(0,30,32,2); c.fillRect(30,0,2,32);
});

// Door closed
makeSprite('door_closed', 32, 32, (c)=>{
  c.fillStyle='#5a3010'; c.fillRect(0,0,32,32);
  c.fillStyle='#3a1a00'; c.fillRect(4,4,24,24);
  c.fillStyle='#7a5020'; c.fillRect(4,4,24,2); c.fillRect(4,4,2,24);
  c.fillStyle='#ffd700'; c.fillRect(14,14,5,5);
});

// Door open
makeSprite('door_open', 32, 32, (c)=>{
  c.fillStyle='#2a2a3a'; c.fillRect(0,0,32,32);
  c.fillStyle='#1a1a2a'; c.fillRect(4,4,24,24);
});

// Stairs
makeSprite('stairs', 32, 32, (c)=>{
  c.fillStyle='#4a4a5a'; c.fillRect(0,0,32,32);
  c.fillStyle='#ffd700';
  for(let i=0;i<4;i++) { c.fillRect(4+i*6,4+i*6,28-i*6,4); }
  c.fillStyle='#aaa800'; c.fillText&&null;
});

// Player sprite (16x16 → drawn at 2px scale = 32x32)
makeSprite('player', 32, 32, (c)=>{
  const d=(col,x,y)=>px(c,col,x,y);
  // shadow
  c.fillStyle='rgba(0,0,0,0.3)'; c.fillRect(6,28,20,4);
  // legs
  d('#1a4aaa',5,12);d('#1a4aaa',6,12);d('#1a4aaa',5,13);
  d('#1a4aaa',9,12);d('#1a4aaa',10,12);d('#1a4aaa',9,13);
  // body
  for(let x=4;x<=11;x++) for(let y=8;y<=11;y++) d('#3a7acc',x,y);
  d('#cc6633',5,9);d('#cc6633',10,9);
  // head
  for(let x=4;x<=11;x++) for(let y=3;y<=7;y++) d('#f0b060',x,y);
  d('#331100',5,5);d('#331100',6,5);d('#331100',9,5);d('#331100',10,5);
  d('#cc6622',4,3);d('#cc6622',5,3);d('#cc6622',6,3);d('#cc6622',7,3);
  d('#cc6622',8,3);d('#cc6622',9,3);d('#cc6622',10,3);d('#cc6622',11,3);
  d('#cc6622',4,4);d('#cc6622',11,4);
  // sword arm
  d('#c0a040',12,9);d('#c0a040',13,8);d('#c0a040',14,7);d('#c0a040',15,6);
});

// Wolf companion sprite
makeSprite('wolf', 32, 32, (c)=>{
  const d=(col,x,y)=>px(c,col,x,y);
  // Shadow
  c.fillStyle='rgba(0,0,0,0.3)'; c.fillRect(4,28,20,4);
  // Tail (curled up at left)
  d('#aaaaaa',1,5);d('#aaaaaa',1,6);d('#aaaaaa',1,7);d('#aaaaaa',2,5);d('#aaaaaa',2,6);
  // Body
  for(let x=2;x<=9;x++) for(let y=8;y<=12;y++) d('#888888',x,y);
  // Legs
  for(let y=12;y<=14;y++){d('#777777',3,y);d('#777777',4,y);d('#777777',6,y);d('#777777',7,y);}
  // Neck
  for(let y=5;y<=8;y++) d('#888888',9,y);
  // Head
  for(let x=9;x<=14;x++) for(let y=4;y<=9;y++) d('#888888',x,y);
  // Snout
  for(let x=12;x<=14;x++) for(let y=7;y<=9;y++) d('#cccccc',x,y);
  // Eyes
  d('#111111',10,5);d('#111111',10,6);d('#111111',12,5);d('#111111',12,6);
  // Ears
  d('#555555',10,3);d('#555555',10,4);d('#555555',13,3);d('#555555',13,4);
  // Nose
  d('#333333',14,7);
  // Red collar
  d('#cc2222',9,8);d('#cc2222',10,8);d('#cc2222',11,8);
});

// Zombie
makeSprite('zombie', 32, 32, (c)=>{
  const d=(col,x,y)=>px(c,col,x,y);
  c.fillStyle='rgba(0,0,0,0.25)'; c.fillRect(6,28,20,4);
  for(let x=4;x<=11;x++) for(let y=8;y<=12;y++) d('#3a7a3a',x,y);
  for(let x=4;x<=11;x++) for(let y=3;y<=7;y++) d('#4a9a4a',x,y);
  d('#111',5,5);d('#111',6,5);d('#111',9,5);d('#111',10,5);
  d('#2a2a2a',6,7);d('#7a7a7a',7,7);d('#8a2020',8,7);
  d('#3a7a3a',5,12);d('#3a7a3a',6,12);d('#3a7a3a',5,13);
  d('#3a7a3a',9,12);d('#3a7a3a',10,12);d('#3a7a3a',9,13);
  // arms out
  d('#3a7a3a',2,8);d('#3a7a3a',2,9);d('#3a7a3a',3,8);
  d('#3a7a3a',12,8);d('#3a7a3a',12,9);d('#3a7a3a',13,8);
});

// Skeleton
makeSprite('skeleton', 32, 32, (c)=>{
  const d=(col,x,y)=>px(c,col,x,y);
  c.fillStyle='rgba(0,0,0,0.2)'; c.fillRect(6,28,20,4);
  for(let x=4;x<=11;x++) for(let y=8;y<=12;y++) d('#ccccaa',x,y);
  for(let x=4;x<=11;x++) for(let y=3;y<=7;y++) d('#ddddcc',x,y);
  d('#222',5,5);d('#222',6,5);d('#222',9,5);d('#222',10,5);
  // ribs
  d('#aaa888',5,9);d('#aaa888',10,9);d('#aaa888',5,11);d('#aaa888',10,11);

// === ON-SCREEN CONTROLS ===
(function(){
  const map={
    'oc-up':'KeyW','oc-down':'KeyS','oc-left':'KeyA','oc-right':'KeyD'
  };
  Object.keys(map).forEach(id=>{
    const code=map[id];
    const el=document.getElementById(id);
    if(!el) return;
    const press=()=>{ keys[code]=true; el.classList.add('pressed'); };
    const release=()=>{ keys[code]=false; el.classList.remove('pressed'); };
    el.addEventListener('pointerdown', e=>{ e.preventDefault(); press(); });
    el.addEventListener('pointerup',   e=>{ e.preventDefault(); release(); });
    el.addEventListener('pointerleave',e=>{ release(); });
    el.addEventListener('pointercancel',e=>{ release(); });
  });
  const atk=document.getElementById('oc-attack');
  if(atk){
    const pressA=()=>{ mouse.left=true; atk.classList.add('pressed'); };

    atk.addEventListener('pointerdown', e=>{ e.preventDefault(); pressA(); });
    atk.addEventListener('pointerup',   e=>{ e.preventDefault(); releaseA(); });

// === MAP GENERATION ===
let map={tiles:null,w:0,h:0,rooms:[]};
const T={VOID:0,FLOOR:1,WALL:2,DOOR_C:3,DOOR_O:4,STAIRS:5};

function getTile(tx,ty){
  if(tx<0||ty<0||tx>=map.w||ty>=map.h) return T.VOID;
  return map.tiles[ty*map.w+tx];
}
function setTile(tx,ty,v){
  if(tx<0||ty<0||tx>=map.w||ty>=map.h) return;
  map.tiles[ty*map.w+tx]=v;
}

// Simple random with seed
let rngSeed=1;
function rng(){
  rngSeed=(rngSeed*1664525+1013904223)&0xffffffff;
  return (rngSeed>>>0)/0xffffffff;
}
function rndInt(a,b){ return Math.floor(rng()*(b-a+1))+a; }

function generateLevel(lvl) {
  rngSeed = Date.now() ^ (lvl*31337);
  const W=80+lvl*4, H=60+lvl*4;
  map.w=W; map.h=H;
  map.tiles=new Uint8Array(W*H);
  map.tiles.fill(T.VOID);
  map.rooms=[];
  map.doors=[];

  // BSP split
  function split(x,y,w,h,depth) {
    if(depth===0||w<14||h<14) {
      // Leaf: place room
      const rw=rndInt(8,Math.min(w-4,18));
      const rh=rndInt(7,Math.min(h-4,14));
      const rx=x+rndInt(2,w-rw-2);
      const ry=y+rndInt(2,h-rh-2);
      map.rooms.push({x:rx,y:ry,w:rw,h:rh,cleared:false,type:'combat',enemies:[],spawns:[]});
      return {x:rx,y:ry,w:rw,h:rh,cx:rx+Math.floor(rw/2),cy:ry+Math.floor(rh/2)};
    }
    let a,b;
    if(w>h) {
      const mid=rndInt(Math.floor(w*0.4),Math.floor(w*0.6));
      a=split(x,y,mid,h,depth-1);
      b=split(x+mid,y,w-mid,h,depth-1);
    } else {
      const mid=rndInt(Math.floor(h*0.4),Math.floor(h*0.6));
      a=split(x,y,w,mid,depth-1);
      b=split(x,y+mid,w,h-mid,depth-1);
    }
    // Connect rooms with L-corridor
    connectRooms(a.cx,a.cy,b.cx,b.cy);
    return {x:Math.min(a.x,b.x),y:Math.min(a.y,b.y),
            w:Math.max(a.x+a.w,b.x+b.w)-Math.min(a.x,b.x),
            h:Math.max(a.y+a.h,b.y+b.h)-Math.min(a.y,b.y),
            cx:Math.floor((a.cx+b.cx)/2),cy:Math.floor((a.cy+b.cy)/2)};
  }

  function connectRooms(x1,y1,x2,y2) {
    let cx=x1,cy=y1;
    while(cx!==x2) {
      setTile(cx,cy-1,T.FLOOR);
      setTile(cx,cy,T.FLOOR);
      setTile(cx,cy+1,T.FLOOR);
      cx+=(cx<x2)?1:-1;
    }
    // Carve 3x3 at the elbow so the corner isn't a 1-tile pinch
    for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++) setTile(cx+dx,cy+dy,T.FLOOR);
    while(cy!==y2) {
      setTile(cx-1,cy,T.FLOOR);
      setTile(cx,cy,T.FLOOR);
      setTile(cx+1,cy,T.FLOOR);
      cy+=(cy<y2)?1:-1;
    }
  }

  split(1,1,W-2,H-2, 3+Math.floor(lvl/2));

  // Fill rooms with floor
  for(const r of map.rooms) {
    for(let ty=r.y;ty<r.y+r.h;ty++) for(let tx=r.x;tx<r.x+r.w;tx++) setTile(tx,ty,T.FLOOR);
  }
  // Walls around floors
  for(let ty=0;ty<H;ty++) for(let tx=0;tx<W;tx++) {
    if(getTile(tx,ty)===T.VOID) {
      let adj=false;
      for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++) {
        if(getTile(tx+dx,ty+dy)===T.FLOOR) {adj=true;break;}
      }
      if(adj) setTile(tx,ty,T.WALL);
    }
  }

  // Assign room types
  if(map.rooms.length>0) map.rooms[0].type='start';
  if(map.rooms.length>1) {
    map.rooms[map.rooms.length-1].type='boss';
  }
  if(map.rooms.length>2) {
    map.rooms[Math.floor(map.rooms.length/2)].type='treasure';
  }

  // Place stairs in boss room
  const bossRoom=map.rooms[map.rooms.length-1];
  const sx=bossRoom.x+Math.floor(bossRoom.w/2);
  const sy=bossRoom.y+Math.floor(bossRoom.h/2);
  setTile(sx,sy,T.STAIRS);

  // Enemy spawns — tuned for beatable difficulty
  const diff=1.0+lvl*0.12; // level 5 = 1.6x HP
  for(let i=1;i<map.rooms.length;i++) {
    const r=map.rooms[i];
    if(r.type==='start') continue;
    const count = r.type==='boss'
      ? (difficulty==='easy'             ? 1
       : difficulty==='hardcore'         ? (lvl===5?4:3)
       : difficulty==='impossible'       ? (lvl===5?6:5)
       : difficulty==='chaos_q'          ? (lvl===5?12:8)
       : difficulty==='super_apocalypse' ? (lvl===5?15:10)
       : difficulty==='unknown'          ? (lvl===5?50:35)
       : difficulty==='chaos'           ? (lvl===5?500:200)
       : difficulty==='oblivion'        ? (lvl===5?2500:1000)
       : difficulty==='godmode'         ? (lvl===5?1000000:10000)
       : (lvl===5?2:1))                  // adventure default
      : r.type==='treasure'
        ? 0
        : rndInt(1, 1+Math.floor(lvl*0.6));       // regular: 1-2 on lvl1, 1-4 on lvl5
    r.spawns=[];
    const types=['zombie','skeleton','spider'];
    const weights=lvl<2?[0.7,0.2,0.1]:lvl<4?[0.4,0.35,0.25]:[0.3,0.35,0.35];
    for(let s=0;s<count;s++) {
      const ex=r.x+rndInt(1,r.w-2);
      const ey=r.y+rndInt(1,r.h-2);
      const roll=rng();
      let type=types[0];
      if(roll>weights[0]+weights[1]) type=types[2];
      else if(roll>weights[0]) type=types[1];
      // Which levels have actual boss enemies
      const easyBossLvls=[3,5];
      const isActualBoss = r.type==='boss' && (difficulty!=='easy' || easyBossLvls.includes(lvl));
      if(r.type==='boss' && isActualBoss) {
        const bossRota=['lich','wither','bone_lord','zombie_king','wither','zombie_king'];
        if(lvl===5) type=bossRota[s%bossRota.length];
        else if(lvl===4) type=['bone_lord','wither','zombie_king','bone_lord','wither'][s]||'bone_lord';
        else if(lvl===3) type=['wither','zombie_king','bone_lord','wither','zombie_king'][s]||'wither';
        else if(lvl===2) type=['zombie_king','wither','bone_lord','zombie_king','wither'][s]||'zombie_king';
        else if(lvl===1) type=['zombie_king','zombie_king','wither','zombie_king','wither'][s]||'zombie_king';
      }
      r.spawns.push({x:ex*TILE+TILE/2,y:ey*TILE+TILE/2,type,diff,isBoss:isActualBoss});
    }
  }
  // Treasure room loot
  const tr=map.rooms.find(r=>r.type==='treasure');
  if(tr) {
    tr.lootSpot={x:tr.x*TILE+tr.w*TILE/2, y:tr.y*TILE+tr.h*TILE/2};
  }
}

// === COMPANION (Wolf) ===
let companion=null;
function makeCompanion(x,y) {
  return {x,y,vx:0,vy:0,w:24,h:24,hp:60,maxHp:60,alive:true,flashT:0,attkCd:0,spinAngle:0,spinTimer:0};
}
function updateCompanion(dt) {
  if(!companion||!companion.alive) return;
  companion.flashT=Math.max(0,companion.flashT-dt);
  companion.attkCd=Math.max(0,companion.attkCd-dt);
  companion.spinTimer=Math.max(0,companion.spinTimer-dt);
  if(companion.spinTimer>0) companion.spinAngle+=Math.PI*8*dt;
  const dx=player.x-companion.x, dy=player.y-companion.y;
  const d=Math.sqrt(dx*dx+dy*dy);
  const wolfSpd=cfg.playerSpeed*2;
  // Find nearest enemy across entire map (no range limit)
  let nearest=null, nearestD=Infinity;
  for(const e of enemies) {
    if(!e.alive) continue;
    const ed=dist(companion,e);
    if(ed<nearestD){nearest=e;nearestD=ed;}
  }
  // Chase nearest enemy; fall back to following player when no enemies
  if(nearest) {
    const edx=nearest.x-companion.x, edy=nearest.y-companion.y;
    companion.vx+=(edx/nearestD)*wolfSpd*dt;
    companion.vy+=(edy/nearestD)*wolfSpd*dt;
  } else if(d>50) {
    companion.vx+=(dx/d)*Math.min(wolfSpd,d*4)*dt;
    companion.vy+=(dy/d)*Math.min(wolfSpd,d*4)*dt;
  }
  companion.vx*=0.82; companion.vy*=0.82;
  moveEntity(companion,companion.vx,companion.vy,dt);
  // Attack when close enough
  if(nearest&&nearestD<32&&companion.attkCd<=0) {
    const adx=nearest.x-companion.x, ady=nearest.y-companion.y;
    companion.attkCd=1.0; companion.spinTimer=0.3;
    damageEnemy(nearest,10,adx/nearestD*150,ady/nearestD*150);
    SFX.swing();
  }
}
function renderCompanion() {
  if(!companion||!companion.alive) return;
  const cx=companion.x-camera.x, cy=companion.y-camera.y;
  ctx.save();
  ctx.translate(cx,cy);
  if(companion.spinTimer>0) ctx.rotate(companion.spinAngle);
  if(companion.flashT>0) ctx.filter=`brightness(${1+companion.flashT*6}) saturate(0)`;
  ctx.drawImage(sprites['wolf'],-16,-16);
  ctx.filter='none';
  if(companion.spinTimer>0) {
    ctx.globalAlpha=0.6;
    ctx.strokeStyle='#44ff88';
    ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(0,0);
    ctx.lineTo(Math.cos(companion.spinAngle-0.8)*28,Math.sin(companion.spinAngle-0.8)*28);
    ctx.stroke();
  }
  ctx.restore();
  // HP bar
  if(companion.hp<companion.maxHp) drawBar(cx-15,cy-28,30,5,companion.hp,companion.maxHp,'#22cc44','#114422');
  // Label
  ctx.save(); ctx.globalAlpha=0.85; ctx.font='bold 9px monospace';
  ctx.fillStyle='#aaffaa'; ctx.textAlign='center';
  ctx.fillText('Wolf',cx,cy-32); ctx.textAlign='left';
  ctx.restore();
}

function makeLoot(x,y,type,weapon=null) {
  return {x,y,type,weapon,alive:true,bobT:rng()*Math.PI*2};
}

function spawnParticles(x,y,n,colors,minSpd=60,maxSpd=160,life=0.5,size=3) {
  for(let i=0;i<n;i++) {
    const a=rng()*Math.PI*2;
    const spd=minSpd+rng()*(maxSpd-minSpd);
    const col=colors[Math.floor(rng()*colors.length)];
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
      color:col,life,maxLife:life,size:size+(rng()-0.5)*size*0.5,alive:true,
      gravity:rng()>0.5?80:0});
  }
}

// === COLLISION ===
function tileBlocked(tx,ty) {
  const t=getTile(tx,ty);
  return t===T.VOID||t===T.WALL||t===T.DOOR_C;
}
function entityBlockedX(e) {
  const hw=e.w/2-2, hh=e.h/2-2;
  for(const [cx,cy] of [[e.x-hw,e.y-hh],[e.x+hw,e.y-hh],[e.x-hw,e.y+hh],[e.x+hw,e.y+hh]]) {
    if(tileBlocked(Math.floor(cx/TILE),Math.floor(cy/TILE))) return true;
  }
  return false;
}
function moveEntity(e, dx, dy, dt) {
  e.x += dx*dt;
  if(entityBlockedX(e)) e.x -= dx*dt;
  e.y += dy*dt;
  if(entityBlockedX(e)) e.y -= dy*dt;
}
function dist2(a,b){ const dx=a.x-b.x,dy=a.y-b.y; return dx*dx+dy*dy; }
function dist(a,b){ return Math.sqrt(dist2(a,b)); }
function aabbHit(a,b){ return Math.abs(a.x-b.x)<(a.w+b.w)/2&&Math.abs(a.y-b.y)<(a.h+b.h)/2; }

// LOS check
function hasLOS(x1,y1,x2,y2) {
  const dx=x2-x1,dy=y2-y1;
  const steps=Math.max(Math.abs(dx),Math.abs(dy))/TILE*2;
  for(let i=0;i<=steps;i++) {
    const t=i/steps;
    const tx=Math.floor((x1+dx*t)/TILE);
    const ty=Math.floor((y1+dy*t)/TILE);
    if(tileBlocked(tx,ty)) return false;
  }
  return true;
}

// === DAMAGE ===
function damageEnemy(e, dmg, kx=0, ky=0) {
  if(!e.alive) return;
  e.hp -= dmg;
  e.flashT = 0.15;
  e.vx+=kx; e.vy+=ky;
  spawnParticles(e.x,e.y,6,['#cc2222','#ff4444','#882222'],60,140,0.35,4);
  // Floating damage number
  const isCrit = strengthTimer>0;
  dmgNumbers.push({x:e.x+(Math.random()-0.5)*20, y:e.y-20, val:Math.round(dmg),
    life:1.0, vy:-60, color:isCrit?'#ff8800':'#ffffff', big:isCrit});
  SFX.hit();
  if(e.hp<=0) killEnemy(e);
}
function damagePlayer(dmg) {
  if(invincTimer>0||rollTimer>0) return; // invincible while rolling
  const def = player.armorItem ? player.armorItem.defense : 0;
  const actual = Math.round(dmg * (1 - def));
  player.hp=Math.max(0,player.hp-actual);
  dmgNumbers.push({x:player.x+(Math.random()-0.5)*16, y:player.y-24, val:actual,
    life:1.0, vy:-50, color:'#ff4444', big:false});
  player.flashT=0.18;
  invincTimer=0.7;
  noHitTimer=0;
  camera.shake=0.25; camera.shakeAmp=6;
  spawnParticles(player.x,player.y,8,['#cc2222','#ff6666'],50,120,0.4,3);
  SFX.hurt();
  if(player.hp<=0) endGame(false);
}

function killEnemy(e) {
  e.alive=false;
  score+=e.def.xp;
  spawnParticles(e.x,e.y,14,[e.def.color,'#cc2222','#442222'],40,180,0.8,4);
  SFX.die();
  // Boss enemies always drop a health potion + a bonus loot
  if(e.isBoss) {
    // Heal player 50 HP on boss kill
    player.hp=Math.min(player.maxHp, player.hp+50);
    spawnParticles(player.x,player.y,16,['#ff4444','#ff8888','#ffffff'],60,160,0.6,4);
    dmgNumbers.push({x:player.x,y:player.y-28,val:'+50 HP',life:1.2,vy:-55,color:'#ff6666',big:true});
    lootItems.push(makeLoot(e.x,e.y,'health'));
    if(rng()<0.4) lootItems.push(makeLoot(e.x+32,e.y,'golden_apple'));
  }
  // loot drop — armor only
  const roll=rng();
  if(roll<0.25) {
    // 25% armor drop
    const baseTier=Math.min(dungeonLevel,4);
    const r2=rng();
    const tier = r2<0.05 ? 4
               : r2<0.25 ? Math.min(4,baseTier+1)
               : baseTier;
    lootItems.push(makeLoot(e.x,e.y,'armor',ARMOR_DEFS[tier-1]));
  } else if(roll<0.40) {
    // 15% swiftness potion drop
    lootItems.push(makeLoot(e.x,e.y,'swift'));
  } else {
    lootItems.push(makeLoot(e.x,e.y,'coin'));
  }
}

// === ENEMY AI ===
function updateEnemies(dt) {
  for(const e of enemies) {
    if(!e.alive) continue;
    e.flashT=Math.max(0,e.flashT-dt);
    e.attkCd=Math.max(0,e.attkCd-dt);
    e.vx*=0.85; e.vy*=0.85;

    const d=dist(e,player);
    const def=e.def;
    const canSee = d<def.aggro && hasLOS(e.x,e.y,player.x,player.y);

    if(e.type==='spider') {
      e.dashCd=Math.max(0,(e.dashCd||0)-dt);
      e.dashT=Math.max(0,(e.dashT||0)-dt);
    }

    if(canSee||e.state!=='idle') {
      if(e.state==='idle') e.state='chase';

      if(def.ranged) {
        // Ranged enemies: maintain distance, shoot
        if(d < 80) {
          const angle=Math.atan2(e.y-player.y,e.x-player.x);
          e.vx+=Math.cos(angle)*def.spd*1.5*dt;
          e.vy+=Math.sin(angle)*def.spd*1.5*dt;
        } else if(d>def.attkR+20) {
          const angle=Math.atan2(player.y-e.y,player.x-e.x);
          e.vx+=Math.cos(angle)*def.spd*dt;
          e.vy+=Math.sin(angle)*def.spd*dt;
        }
        if(d<=def.attkR && e.attkCd<=0 && canSee) {
          // Shoot
          const angle=Math.atan2(player.y-e.y,player.x-e.x);
          projectiles.push({
            x:e.x,y:e.y,
            vx:Math.cos(angle)*280, vy:Math.sin(angle)*280,
            dmg:def.dmg, owner:'enemy', alive:true, r:5,
            color: e.type==='lich'?'#cc44ff':'#cccc80',
          });
          e.attkCd = e.type==='lich'?0.8:1.8;
        }
      } else if(e.type==='spider') {
        if(e.dashT>0) {
          const angle=Math.atan2(player.y-e.y,player.x-e.x);
          e.vx+=Math.cos(angle)*def.spd*4*dt;
          e.vy+=Math.sin(angle)*def.spd*4*dt;
        } else {
          const angle=Math.atan2(player.y-e.y,player.x-e.x)+(rng()-0.5)*0.4;
          e.vx+=Math.cos(angle)*def.spd*dt;
          e.vy+=Math.sin(angle)*def.spd*dt;
          if(d<def.attkR && e.dashCd<=0) {
            e.dashT=0.35; e.dashCd=2.0;
          }
        }
        if(d<def.attkR && e.attkCd<=0) {
          damagePlayer(def.dmg);
          e.attkCd=0.8;
        }
      } else {
        // Zombie: charge directly
        if(d>30) {
          const angle=Math.atan2(player.y-e.y,player.x-e.x);
          e.vx+=Math.cos(angle)*def.spd*dt;
          e.vy+=Math.sin(angle)*def.spd*dt;
        }
        if(d<def.attkR && e.attkCd<=0) {
          damagePlayer(def.dmg);
          e.attkCd=1.2;
          SFX.hit();
        }
      }
    }

    moveEntity(e, e.vx, e.vy, dt);
    // Clamp velocity
    const sp=Math.sqrt(e.vx*e.vx+e.vy*e.vy);
    if(sp>def.spd*(e.dashT>0?4:1.5)) { const r=def.spd*(e.dashT>0?4:1.5)/sp; e.vx*=r; e.vy*=r; }
  }
  enemies=enemies.filter(e=>e.alive);
}

// === MELEE ATTACK ===
function doMeleeAttack() {
  SFX.swing();
  meleeFlash=0.18;
  meleeAngle=player.aimAngle;
  const range=cfg.meleeRange;
  const arc=cfg.meleeArc;
  for(const e of enemies) {
    if(!e.alive) continue;
    const dx=e.x-player.x, dy=e.y-player.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d>range+e.w/2) continue;
    const angle=Math.atan2(dy,dx);
    let diff=angle-player.aimAngle;
    while(diff>Math.PI) diff-=Math.PI*2;
    while(diff<-Math.PI) diff+=Math.PI*2;
    if(Math.abs(diff)<arc/2) {
      const kb=200;
      const nx=dx/d, ny=dy/d;
      hitCount++;
      const isCrit = hitCount%10===0;
      const baseDmg = player.weapon.dmg * (strengthTimer>0 ? STRENGTH_MULT : 1);
      const dmg = isCrit ? baseDmg+10 : baseDmg;
      if(isCrit) {
        spawnParticles(e.x,e.y,12,['#ffff00','#ffaa00','#ffffff'],80,200,0.5,4);
        dmgNumbers.push({x:e.x,y:e.y-16,val:'CRIT! '+dmg,life:1.2,vy:-60,color:'#ffdd00',big:true});
      }
      damageEnemy(e, dmg, nx*kb, ny*kb);
    }
  }
}

// === PROJECTILES ===
function arrowExplode(x,y) {
  const EXPLODE_R = 5*TILE; // 5 blocks
  const EXPLODE_DMG = 50;
  // Big fiery explosion particles
  spawnParticles(x,y,30,['#ff8800','#ffcc00','#ff4400','#ffffff'],120,200,0.6,6);
  spawnParticles(x,y,15,['#888888','#555555'],60,120,0.8,4);
  // Screen flash ring drawn via a short-lived particle with size
  particles.push({x,y,vx:0,vy:0,color:'#ff6600',size:EXPLODE_R*2,life:0.18,maxLife:0.18,alive:true});
  // Deal damage to all enemies in radius
  for(const e of enemies) {
    if(!e.alive) continue;
    const dx=e.x-x, dy=e.y-y;
    if(dx*dx+dy*dy<EXPLODE_R*EXPLODE_R) {
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      damageEnemy(e, EXPLODE_DMG, dx/d*200, dy/d*200);
    }
  }
  try{ SFX.hit(); SFX.hit(); }catch(e){}
}

function updateProjectiles(dt) {
  for(const p of projectiles) {
    if(!p.alive) continue;
    p.x+=p.vx*dt; p.y+=p.vy*dt;

    const tx=Math.floor(p.x/TILE), ty=Math.floor(p.y/TILE);
    if(tileBlocked(tx,ty)) {
      p.alive=false;
      if(p.owner==='player') { arrowExplode(p.x,p.y); } else { spawnParticles(p.x,p.y,4,['#888','#aaa'],30,80,0.3,3); }
      continue;
    }
    if(p.owner==='player') {
      for(const e of enemies) {
        if(!e.alive) continue;
        const dx=e.x-p.x, dy=e.y-p.y;
        if(dx*dx+dy*dy<(p.r+e.w/2)*(p.r+e.w/2)) {
          p.alive=false;
          arrowExplode(p.x,p.y);
          break;
        }
      }
    } else {
      const dx=player.x-p.x, dy=player.y-p.y;
      if(dx*dx+dy*dy<(p.r+player.w/2)*(p.r+player.w/2)) {
        damagePlayer(p.dmg);
        p.alive=false;
      }
    }
  }
  projectiles=projectiles.filter(p=>p.alive);
}

// === PARTICLES ===
function updateParticles(dt) {
  for(const p of particles) {
    if(!p.alive) continue;
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    if(p.gravity) p.vy+=p.gravity*dt;
    p.life-=dt;
    if(p.life<=0) p.alive=false;
  }
  if(particles.length>600) particles=particles.filter(p=>p.alive);
  for(const n of dmgNumbers) {
    n.y+=n.vy*dt;
    n.vy*=0.92;
    n.life-=dt;
  }
  if(dmgNumbers.length>80) dmgNumbers=dmgNumbers.filter(n=>n.life>0);
}

// === LOOT ===
function updateLoot(dt) {
  for(const item of lootItems) {
    if(!item.alive) continue;
    item.bobT+=dt*2;
    const d=dist(player,item);
    if(d<24||(keys['KeyE']&&d<60)) {
      collectLoot(item);
    }
  }
}

function collectLoot(item) {
  item.alive=false;
  SFX.pickup();
  spawnParticles(item.x,item.y,8,['#ffd700','#ffee88'],60,140,0.5,3);
  if(item.type==='swift') {
    swiftTimer=SWIFT_DUR;
    spawnParticles(item.x,item.y,12,['#2299ff','#44bbff','#aaeeff'],80,200,0.6,3);
    playSound(660,'sine',0.3,300,0.25);
  } else if(item.type==='strength') {
    strengthTimer=STRENGTH_DUR;
    spawnParticles(item.x,item.y,14,['#cc2222','#ff5544','#ffaa44'],80,220,0.6,4);
    playSound(180,'sawtooth',0.1,80,0.2); playSound(280,'sawtooth',0.15,120,0.2);
  } else if(item.type==='health') {
    player.hp=player.maxHp;
    spawnParticles(item.x,item.y,12,['#ff4444','#ff8888','#ffffff'],60,160,0.6,3);
    playSound(440,'sine',0.2,200,0.3);
  } else if(item.type==='golden_apple') {
    if(player.hp>=75) {
      player.maxHp=Math.min(200, player.maxHp+50);
      player.hp=player.maxHp;
      spawnParticles(item.x,item.y,20,['#ffd700','#ffee88','#ffffff','#ffaa00'],80,220,0.8,5);
      dmgNumbers.push({x:item.x,y:item.y-20,val:'MAX HP +50!',life:1.5,vy:-50,color:'#ffd700',big:true});
      playSound(880,'sine',0.3,500,0.5);
    } else {
      player.hp=player.maxHp;
      spawnParticles(item.x,item.y,12,['#ffd700','#ffee88'],60,160,0.6,4);
      playSound(660,'sine',0.25,300,0.4);
    }
  } else if(item.type==='armor') {
    const cur=player.armorItem;
    if(!cur || item.weapon.tier > cur.tier) {
      player.armorItem=item.weapon; // armor data stored in weapon field
      spawnParticles(item.x,item.y,10,[item.weapon.color,'#ffffff'],60,160,0.6,4);
    }
  } else if(item.type==='coin') {
    score+=5;
  } else if(item.type==='weapon') {
    if(item.weapon.dmg > player.weapon.dmg) {
      player.weapon=item.weapon;
      player.swordDmg=item.weapon.dmg;
    }
  } else if(item.type==='bow') {
    player.hasBow=true;
    player.bowDmg=item.weapon.dmg;
  }
  lootItems=lootItems.filter(i=>i.alive||i===item);
}

// === PLAYER UPDATE ===
function updatePlayer(dt) {
  if(!player.alive) return;
  player.flashT=Math.max(0,player.flashT-dt);
  invincTimer=Math.max(0,invincTimer-dt);
  attackTimer=Math.max(0,attackTimer-dt);
  bowTimer=Math.max(0,bowTimer-dt);
  meleeFlash=Math.max(0,meleeFlash-dt);
  swiftTimer=Math.max(0,swiftTimer-dt);
  if(spinTimer>0) {
    spinTimer=Math.max(0,spinTimer-dt);
    spinAngle+=Math.PI*8*dt;  // fast full spin
  }
  strengthTimer=Math.max(0,strengthTimer-dt);
  healPotionCd=Math.max(0,healPotionCd-dt);
  bombCd=Math.max(0,bombCd-dt);
  if((keys['KeyB']&&!keysWas['KeyB']) && bombCd<=0) {
    bombCd=BOMB_CD;
    const BOMB_R=5*TILE;
    spawnParticles(player.x,player.y,40,['#ff8800','#ffcc00','#ff4400','#ffffff','#ff6600'],140,280,0.7,8);
    spawnParticles(player.x,player.y,20,['#555555','#333333'],80,160,0.9,5);
    camera.shake=0.4; camera.shakeAmp=12;
    for(const e of enemies) {
      if(!e.alive) continue;
      const dx=e.x-player.x, dy=e.y-player.y;
      if(dx*dx+dy*dy<BOMB_R*BOMB_R) {
        const d=Math.sqrt(dx*dx+dy*dy)||1;
        damageEnemy(e,100,dx/d*300,dy/d*300);
      }
    }
    try{ SFX.hit(); SFX.hit(); SFX.hit(); }catch(e){}
  }
  if((keys['KeyH']&&!keysWas['KeyH']) && healPotionCd<=0) {
    healPotionCd=HEAL_POTION_CD;
    player.hp=player.maxHp;
    spawnParticles(player.x,player.y,20,['#22cc55','#55ff88','#aaffcc','#ffffff'],60,180,0.7,4);
    playSound(660,'sine',0.35,600,0.4);
    dmgNumbers.push({x:player.x,y:player.y-20,val:'HEALED!',life:1.2,vy:-50,color:'#55ff88',big:true});
  }
  teleportCd=Math.max(0,teleportCd-dt);
  rollTimer=Math.max(0,rollTimer-dt);
  rollCd=Math.max(0,rollCd-dt);
  noHitTimer+=dt;
  // Regen 3 HP/sec when out of combat for 4 seconds
  if(noHitTimer>4 && player.hp<player.maxHp) {
    player.hp=Math.min(player.maxHp, player.hp+3*dt);
  }

  // Aim angle
  const wx=player.x-camera.x;
  const wy=player.y-camera.y;
  player.aimAngle=Math.atan2(mouse.y-wy, mouse.x-wx);

  // Movement
  let dx=0,dy=0;
  if(keys['KeyW']||keys['ArrowUp'])    dy-=1;
  if(keys['KeyS']||keys['ArrowDown'])  dy+=1;
  if(keys['KeyA']||keys['ArrowLeft'])  dx-=1;
  if(keys['KeyD']||keys['ArrowRight']) dx+=1;
  if(dx!==0&&dy!==0) { dx*=0.707; dy*=0.707; }
  // Roll — press R to dash in movement direction
  if(keys['KeyF'] && !keysWas['KeyF'] && rollCd<=0 && rollTimer<=0) {
    const rdx = dx||Math.cos(player.aimAngle);
    const rdy = dy||Math.sin(player.aimAngle);
    const rlen = Math.sqrt(rdx*rdx+rdy*rdy)||1;
    rollDx=rdx/rlen; rollDy=rdy/rlen;
    rollTimer=ROLL_DUR; rollCd=ROLL_CD;
    spawnParticles(player.x,player.y,8,['#aaaaff','#8888ff','#ffffff'],30,100,0.3,3);
    SFX.step();
  }
  const swift = swiftTimer>0 ? SWIFT_MULT : 1;
  const rollMult = rollTimer>0 ? ROLL_SPD : 1;
  const moveDx = rollTimer>0 ? rollDx : dx;
  const moveDy = rollTimer>0 ? rollDy : dy;
  const spd=cfg.playerSpeed * swift * rollMult;
  moveEntity(player, moveDx*spd, moveDy*spd, dt);
  // Trail particles during roll
  if(rollTimer>0) spawnParticles(player.x,player.y,1,['#aaaaff','#ffffff'],15,60,0.2,2);

  // Step sounds
  if(dx!==0||dy!==0) {
    stepTimer-=dt;
    if(stepTimer<=0) { SFX.step(); stepTimer=swiftTimer>0?0.18:0.32; }
    // Speed trail particles
    if(swiftTimer>0 && Math.random()<0.5) {
      const h=Math.floor(Math.random()*360);
      const rainbowCol=`hsl(${h},100%,65%)`;
      spawnParticles(player.x,player.y,1,[rainbowCol],20,80,0.4,3);
    }
  }

  // Melee attack (left click or spacebar)
  const atkSpd = swiftTimer>0 ? player.weapon.spd*3 : player.weapon.spd;
  const meleePressed = (mouse.left && !mouseWasLeft) || (keys['Space'] && !keysWas['Space']);
  if(meleePressed && attackTimer<=0) {
    attackTimer=1/atkSpd;
    spinTimer=1/atkSpd;
    doMeleeAttack();
  }
  // Ranged attack
  if((mouse.right && !mouseWasRight || keys['KeyR'] && !keysWas['KeyR']) && bowTimer<=0 && player.hasBow) {
    bowTimer=3.0;
    SFX.arrow();
    const angle=player.aimAngle;
    projectiles.push({
      x:player.x, y:player.y,
      vx:Math.cos(angle)*cfg.arrowSpeed,
      vy:Math.sin(angle)*cfg.arrowSpeed,
      dmg:player.bowDmg*(strengthTimer>0?STRENGTH_MULT:1), owner:'player', alive:true, r:5,
      color: strengthTimer>0?'#ff8844':'#cccc80',
    });
  }
  mouseWasLeft=mouse.left;
  mouseWasRight=mouse.right;
  keysWas=Object.assign({},keys);

  // Teleport (T key) — blink to mouse cursor position
  if(keys['KeyT'] && teleportCd<=0) {
    teleportCd=TELEPORT_CD;
    const destX=mouse.x+camera.x;
    const destY=mouse.y+camera.y;
    const dtx=Math.floor(destX/TILE), dty=Math.floor(destY/TILE);
    const destTile=getTile(dtx,dty);
    if(destTile===T.FLOOR||destTile===T.STAIRS||destTile===T.DOOR_O) {
      // Valid floor — teleport
      spawnParticles(player.x,player.y,16,['#aa88ff','#ffffff','#6644ff'],80,200,0.5,4);
      player.x=destX; player.y=destY;
      spawnParticles(player.x,player.y,16,['#aa88ff','#ffffff','#6644ff'],80,200,0.5,4);
      camera.shake=0.15; camera.shakeAmp=5;
      playSound(600,'sine',0.08,200,0.2); playSound(300,'sine',0.15,-100,0.2);
      invincTimer=0.3; // brief iframe on landing
    }
  }

  // Auto-advance when all enemies in the boss/stair room are defeated
  const bossRoomEnemies=enemies.filter(e=>e.roomType==='boss');
  if(!transitioning&&gameRunning&&bossRoomEnemies.length>0&&bossRoomEnemies.every(e=>!e.alive)) {
    startTransition();
  }

  // Check room cleared & treasure room loot
  for(const r of map.rooms) {
    if(!r.cleared && r.type==='treasure' && r.lootSpot) {
      const px=r.x*TILE, py=r.y*TILE;
      if(player.x>px && player.x<px+r.w*TILE && player.y>py && player.y<py+r.h*TILE) {
        r.cleared=true;
        const aTier=Math.min(4,dungeonLevel+1);
        lootItems.push(makeLoot(r.lootSpot.x,r.lootSpot.y,'armor',ARMOR_DEFS[aTier-1]));
        lootItems.push(makeLoot(r.lootSpot.x+36,r.lootSpot.y,'golden_apple'));
        SFX.door();
      }
    }
  }
}

// === CAMERA ===
function updateCamera(dt) {
  const tx=player.x-CW/2, ty=player.y-CH/2;
  camera.x+=(tx-camera.x)*Math.min(1,dt*8);
  camera.y+=(ty-camera.y)*Math.min(1,dt*8);
  camera.x=Math.max(0, Math.min(camera.x, map.w*TILE-CW));
  camera.y=Math.max(0, Math.min(camera.y, map.h*TILE-CH));
  camera.shake=Math.max(0,camera.shake-dt);
}

// === LEVEL TRANSITION ===
function startTransition() {
  transitioning=true;
  transAlpha=0;
}

function updateTransition(dt) {
  if(!transitioning) return;
  transAlpha+=dt*1.5;
  if(transAlpha>=1 && transAlpha<2) {
    transAlpha=2; // mark processed so this block only runs once
    dungeonLevel++;
    if(dungeonLevel>cfg.maxLevels) {
      endGame(true);
      return;
    }
    generateLevel(dungeonLevel);
    const start=map.rooms[0];
    player.x=start.x*TILE+start.w*TILE/2;
    player.y=start.y*TILE+start.h*TILE/2;
    camera.x=player.x-CW/2;
    camera.y=player.y-CH/2;
    spawnEnemies();
    lootItems=[];
    particles=[];
    projectiles=[];
    // Treasure room loot
    const tr=map.rooms.find(r=>r.type==='treasure');
    if(tr) {
      tr.lootSpot={x:tr.x*TILE+tr.w*TILE/2, y:tr.y*TILE+tr.h*TILE/2};
    }
    startAmb(50+dungeonLevel*4);
    SFX.level();
    // Restore player health between levels
    player.hp=Math.min(player.maxHp, player.hp+50);
    if(companion) { companion.x=player.x+40; companion.y=player.y; companion.vx=0; companion.vy=0; }
    setTimeout(()=>{ transitioning=false; transAlpha=0; }, 400);
  }
}

// === RENDERING ===
function drawSprite(id, x, y, flipX=false, alpha=1, tint=null) {
  if(!sprites[id]) return;
  const s=sprites[id];
  ctx.save();
  ctx.globalAlpha=alpha;
  if(tint) { ctx.globalCompositeOperation='source-atop'; }
  ctx.translate(Math.round(x), Math.round(y));
  if(flipX) { ctx.scale(-1,1); ctx.translate(-s.width,0); }
  ctx.drawImage(s, 0, 0);
  if(tint) { ctx.fillStyle=tint; ctx.globalCompositeOperation='multiply'; ctx.fillRect(0,0,s.width,s.height); }
  ctx.restore();
}

function drawBar(x,y,w,h,val,max,col,bg,label) {
  ctx.fillStyle=bg; ctx.fillRect(x,y,w,h);
  ctx.fillStyle=col; ctx.fillRect(x,y,Math.round(w*Math.max(0,val/max)),h);
  ctx.strokeStyle='#111'; ctx.lineWidth=1; ctx.strokeRect(x,y,w,h);
  if(label) {
    ctx.fillStyle='#fff'; ctx.font='bold 9px monospace';
    ctx.fillText(label+': '+Math.ceil(val)+'/'+max, x+2, y+h-2);
  }
}

function renderMap() {
  const x0=Math.max(0,Math.floor(camera.x/TILE));
  const y0=Math.max(0,Math.floor(camera.y/TILE));
  const x1=Math.min(map.w-1,Math.ceil((camera.x+CW)/TILE));
  const y1=Math.min(map.h-1,Math.ceil((camera.y+CH)/TILE));
  for(let ty=y0;ty<=y1;ty++) for(let tx=x0;tx<=x1;tx++) {
    const t=getTile(tx,ty);
    const sx=tx*TILE-camera.x, sy=ty*TILE-camera.y;
    if(t===T.FLOOR) ctx.drawImage(sprites['floor'],sx,sy);
    else if(t===T.WALL) ctx.drawImage(sprites['wall'],sx,sy);
    else if(t===T.DOOR_C) ctx.drawImage(sprites['door_closed'],sx,sy);
    else if(t===T.DOOR_O) ctx.drawImage(sprites['door_open'],sx,sy);
    else if(t===T.STAIRS) {
      ctx.drawImage(sprites['floor'],sx,sy);
      ctx.drawImage(sprites['stairs'],sx,sy);
    }
  }
}

function renderLoot() {
  for(const item of lootItems) {
    if(!item.alive) continue;
    const sx=item.x-camera.x;
    const sy=item.y-camera.y+Math.sin(item.bobT)*3;
    // Glow
    if(item.type==='swift') {
      // Animated rainbow glow
      const hue=(item.bobT*80)%360;
      const grd=ctx.createRadialGradient(sx,sy,2,sx,sy,22);
      grd.addColorStop(0,`hsla(${hue},100%,65%,0.55)`);
      grd.addColorStop(0.5,`hsla(${(hue+120)%360},100%,55%,0.25)`);
      grd.addColorStop(1,`hsla(${(hue+240)%360},100%,45%,0)`);
      ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(sx,sy,22,0,Math.PI*2); ctx.fill();
    } else {
      let glowCol='255,220,50';
      if(item.type==='strength') glowCol='220,50,30';
      else if(item.type==='armor'&&item.weapon) {
        const c=item.weapon.color.replace('#','');
        const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);
        glowCol=`${r},${g},${b}`;
      }
      const grd=ctx.createRadialGradient(sx,sy,2,sx,sy,18);
      grd.addColorStop(0,`rgba(${glowCol},0.45)`);
      grd.addColorStop(1,`rgba(${glowCol},0)`);
      ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(sx,sy,18,0,Math.PI*2); ctx.fill();
    }
    const sp = item.type==='strength'?'loot_strength'
      : item.type==='swift'?'loot_swift'
      : item.type==='health'?'loot_health'
      : item.type==='armor'?(item.weapon&&item.weapon.sprite?item.weapon.sprite:'armor_leather')
      : item.type==='coin'?'loot_coin'
      : item.type==='golden_apple'?'loot_golden_apple'
      : item.type==='bow'?'loot_bow'
      : item.weapon&&item.weapon.sprite?item.weapon.sprite
      : 'loot_sword';
    const s=sprites[sp];
    if(s) ctx.drawImage(s, sx-s.width/2, sy-s.height/2);
  }
}

function renderEnemies() {
  for(const e of enemies) {
    if(!e.alive) continue;
    const sx=e.x-camera.x-16, sy=e.y-camera.y-16;
    const spId=e.def.boss?'lich':e.def.sprite;
    const s=sprites[spId]||sprites['zombie'];
    // Flash white on hit
    if(e.flashT>0) {
      ctx.save();
      ctx.filter=`brightness(${1+e.flashT*8}) saturate(0)`;
      ctx.drawImage(s, sx, sy);
      ctx.restore();
    } else {
      ctx.drawImage(s, sx, sy);
    }
    // HP bar
    if(e.hp<e.maxHp) {
      const bw=30;
      drawBar(sx+1,sy-8,bw,5,e.hp,e.maxHp,'#cc2222','#440000');
    }
  }
}

function renderPlayer() {
  const sx=player.x-camera.x-16, sy=player.y-camera.y-16;
  // Melee swing arc (full circle flash)
  if(meleeFlash>0) {
    ctx.save();
    ctx.globalAlpha=meleeFlash/0.18*0.4;
    ctx.strokeStyle=player.weapon.color||'#aaaaff';
    ctx.lineWidth=6;
    ctx.beginPath();
    ctx.arc(player.x-camera.x, player.y-camera.y, cfg.meleeRange, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  // Draw player (possibly spinning)
  const cx=player.x-camera.x, cy=player.y-camera.y;
  const spinning=spinTimer>0;
  ctx.save();
  ctx.translate(cx, cy);
  if(spinning) ctx.rotate(spinAngle);
  ctx.translate(-16,-16);

  if(player.flashT>0) {
    ctx.filter=`brightness(${1+player.flashT*6}) saturate(0)`;
    ctx.drawImage(sprites['player'],0,0);
  } else if(swiftTimer>0) {
    const hue=(performance.now()/6)%360;
    ctx.filter=`hue-rotate(${hue}deg) saturate(2) brightness(1.3)`;
    ctx.drawImage(sprites['player'],0,0);
    ctx.filter='none';
    // Rainbow glow
    const rg=ctx.createRadialGradient(16,16,4,16,16,22);
    rg.addColorStop(0,`hsla(${hue},100%,65%,0.35)`);
    rg.addColorStop(1,`hsla(${(hue+180)%360},100%,55%,0)`);
    ctx.save(); ctx.globalCompositeOperation='screen';
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(16,16,22,0,Math.PI*2); ctx.fill();
    ctx.restore();
  } else {
    ctx.drawImage(sprites['player'],0,0);
    if(player.armorItem) {
      ctx.globalAlpha=0.45;
      ctx.fillStyle=player.armorItem.color;
      ctx.fillRect(8,16,16,10);
    }
  }

  // Spin trail: sword streak
  if(spinning) {
    ctx.globalAlpha=0.6;
    ctx.strokeStyle=player.weapon.color||'#aaaaff';
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(16,16);
    ctx.lineTo(16+Math.cos(spinAngle-0.8)*28, 16+Math.sin(spinAngle-0.8)*28);
    ctx.stroke();
  }
  ctx.restore();
  // Aim indicator
  ctx.save();
  ctx.globalAlpha=0.5;
  ctx.strokeStyle='#ffffff';
  ctx.lineWidth=1;
  ctx.setLineDash([4,4]);
  ctx.beginPath();
  ctx.moveTo(player.x-camera.x+Math.cos(player.aimAngle)*16,
             player.y-camera.y+Math.sin(player.aimAngle)*16);
  ctx.lineTo(player.x-camera.x+Math.cos(player.aimAngle)*36,
             player.y-camera.y+Math.sin(player.aimAngle)*36);
  ctx.stroke();
  ctx.restore();
}

function renderProjectiles() {
  for(const p of projectiles) {
    if(!p.alive) continue;
    const sx=p.x-camera.x, sy=p.y-camera.y;
    ctx.save();
    ctx.translate(sx,sy);
    ctx.rotate(Math.atan2(p.vy,p.vx));
    ctx.fillStyle=p.color||'#cccc80';
    if(p.color==='#cc44ff') {
      // Magic bolt
      ctx.globalAlpha=0.9;
      const grd=ctx.createRadialGradient(0,0,0,0,0,10);
      grd.addColorStop(0,'#ff88ff');
      grd.addColorStop(1,'rgba(100,0,150,0)');
      ctx.fillStyle=grd;
      ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
    } else {
      ctx.fillRect(-8,-2,16,4);
    }
    ctx.restore();
  }
}

function renderParticles() {
  for(const p of particles) {
    if(!p.alive) continue;
    ctx.save();
    ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
    ctx.fillStyle=p.color;
    const sx=p.x-camera.x, sy=p.y-camera.y;
    ctx.fillRect(sx-p.size/2, sy-p.size/2, p.size, p.size);
    ctx.restore();
  }
}

function renderHUD() {
  // Health
  drawBar(10,10,160,16,player.hp,player.maxHp,'#cc2222','#330a0a','HP');
  // Armor slot
  const arm=player.armorItem;
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(10,30,160,20);
  if(arm) {
    // Armor icon
    const armSp=sprites[arm.sprite];
    if(armSp) { ctx.save(); ctx.scale(0.7,0.7); ctx.drawImage(armSp,(10+2)/0.7,(30+1)/0.7); ctx.restore(); }
    ctx.fillStyle=arm.color; ctx.font='bold 10px monospace';
    ctx.fillText(arm.name+' (-'+Math.round(arm.defense*100)+'%)', 28, 44);
  } else {
    ctx.fillStyle='#555'; ctx.font='10px monospace';
    ctx.fillText('No Armor (find some!)', 14, 44);
  }
  // Weapon
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(10,54,160,20);
  ctx.fillStyle='#ddd'; ctx.font='bold 11px monospace';
  ctx.fillText('⚔ '+player.weapon.name+(player.hasBow?' | 🏹 Bow':''), 14, 68);
  // Swiftness indicator
  let buffY=78;
  if(swiftTimer>0) {
    const pct=swiftTimer/SWIFT_DUR;
    const barW=Math.round(160*pct);
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(10,buffY,160,18);
    // Rainbow gradient bar
    const rg=ctx.createLinearGradient(10,buffY,170,buffY);
    rg.addColorStop(0,'#ff0000'); rg.addColorStop(0.17,'#ff9900');

function renderMinimap() {
  const mmW=100, mmH=80;
  const mmX=CW-mmW-8, mmY=8;
  ctx.fillStyle='rgba(0,0,0,0.65)';
  ctx.fillRect(mmX-2,mmY-2,mmW+4,mmH+4);
  const sx=mmW/map.w, sy=mmH/map.h;
  for(const r of map.rooms) {
    ctx.fillStyle=r.type==='boss'?'#553322':r.type==='treasure'?'#554422':r.cleared?'#334433':'#223322';
    ctx.fillRect(mmX+r.x*sx, mmY+r.y*sy, r.w*sx, r.h*sy);
  }
  // Corridors (just show all floor tiles at low res)
  ctx.fillStyle='#2a3a2a';
  // skip for performance - rooms give good enough map
  // Player dot
  ctx.fillStyle='#ffffff';
  ctx.fillRect(mmX+(player.x/TILE)*sx-1.5, mmY+(player.y/TILE)*sy-1.5, 3, 3);
  // Enemies
  ctx.fillStyle='#ff4444';
  for(const e of enemies) {
    ctx.fillRect(mmX+(e.x/TILE)*sx-1, mmY+(e.y/TILE)*sy-1, 2, 2);
  }
  // Stairs
  ctx.fillStyle='#ffd700';
  for(let ty=0;ty<map.h;ty++) for(let tx=0;tx<map.w;tx++) {
    if(getTile(tx,ty)===T.STAIRS) ctx.fillRect(mmX+tx*sx-1,mmY+ty*sy-1,3,3);
  }
  ctx.strokeStyle='#445544'; ctx.lineWidth=1; ctx.strokeRect(mmX,mmY,mmW,mmH);
}

function showCutscene(slides, onDone) {
  cs.slides=slides;
  cs.idx=0;
  cs.alpha=0;
  cs.phase='in';
  cs.holdT=0;
  cs.onDone=onDone;
  cs.active=true;
  gameRunning=false;
}

function advanceCutscene() {
  if(!cs.active) return;
  if(cs.phase==='hold') {
    cs.phase='out';
  }
}

function updateCutscene(dt) {
  if(!cs.active) return;
  const slide=cs.slides[cs.idx];
  if(cs.phase==='in') {
    cs.alpha=Math.min(1,cs.alpha+dt*1.5);
    if(cs.alpha>=1) { cs.phase='hold'; cs.holdT=0; }
  } else if(cs.phase==='hold') {
    cs.holdT+=dt;
    if(cs.holdT>=slide.holdDur) cs.phase='out';
  } else if(cs.phase==='out') {
    cs.alpha=Math.max(0,cs.alpha-dt*1.5);
    if(cs.alpha<=0) {
      cs.idx++;
      if(cs.idx>=cs.slides.length) {
        cs.active=false;
        if(cs.onDone) cs.onDone();
      } else {
        cs.phase='in';
        cs.holdT=0;
      }
    }
  }
}

let csTime=0;
function renderCutscene(dt) {
  if(!cs.active) return;
  csTime+=dt;
  const slide=cs.slides[cs.idx];
  ctx.fillStyle=slide.bg||'#000';
  ctx.fillRect(0,0,CW,CH);
  // Draw scene
  ctx.save();
  ctx.globalAlpha=cs.alpha;
  slide.draw(csTime);
  // Dialogue lines
  ctx.textAlign='center';
  const lines=slide.lines||[];
  lines.forEach((line,i)=>{
    const y=(slide.lineY||400)+i*28;
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(CW/2-280,y-18,560,24);
    ctx.fillStyle='#f0f0e0'; ctx.font='bold 16px monospace';
    ctx.fillText(line, CW/2, y);
  });
  if(slide.subline) {
    ctx.fillStyle='#ffd700'; ctx.font='13px monospace';
    ctx.fillText(slide.subline, CW/2, slide.subY||460);
  }
  ctx.textAlign='left';
  // Slide counter dots
  ctx.globalAlpha=cs.alpha*0.6;
  const total=cs.slides.length;
  for(let i=0;i<total;i++) {
    ctx.fillStyle=i===cs.idx?'#fff':'#555';
    ctx.beginPath();ctx.arc(CW/2+(i-(total-1)/2)*16, CH-18, 4, 0, Math.PI*2);ctx.fill();
  }
  ctx.restore();
  // Letterbox bars
  ctx.fillStyle='#000'; ctx.fillRect(0,0,CW,50); ctx.fillRect(0,CH-50,CW,50);
}

function launchGame() {
  dungeonLevel=1; score=0;
  runStartTime=performance.now()/1000;
  generateLevel(1);
  const start=map.rooms[0];
  player=makePlayer(start.x*TILE+start.w*TILE/2, start.y*TILE+start.h*TILE/2);
  player.armorItem=ARMOR_DEFS[0]; // start with leather armor
  camera.x=player.x-CW/2;
  camera.y=player.y-CH/2;
  enemies=[]; particles=[]; projectiles=[]; lootItems=[];
  spawnEnemies();
  // Starting potions: one swiftness, one strength
  lootItems.push(makeLoot(player.x+40, player.y, 'swift'));
  lootItems.push(makeLoot(player.x+72, player.y, 'strength'));
  // Treasure room
  const tr=map.rooms.find(r=>r.type==='treasure');
  if(tr) tr.lootSpot={x:tr.x*TILE+tr.w*TILE/2, y:tr.y*TILE+tr.h*TILE/2};
  companion=makeCompanion(player.x+40,player.y);
  transitioning=false; transAlpha=0;
  mouseWasLeft=false; mouseWasRight=false;
  attackTimer=0; bowTimer=0; swiftTimer=0; strengthTimer=0; noHitTimer=0; dmgNumbers=[]; spinTimer=0; spinAngle=0; teleportCd=0; hitCount=0; rollTimer=0; rollCd=0; healPotionCd=0; bombCd=0;
  gameRunning=true;
  gameState='playing';
  startAmb(50);
}

function endGame(win) {
  gameState=win?'win':'dead';
  gameRunning=false;
  if(ambOsc) try{ ambGain.gain.setTargetAtTime(0,getAudio().currentTime,0.5); }catch(e){}
  // Save to active profile
  const s=loadProfile(activeProfile);
  s.runs++;
  if(win) {
    s.wins++;
    const elapsed=performance.now()/1000-runStartTime;
    if(!s.bestTime||elapsed<s.bestTime) s.bestTime=Math.round(elapsed);
  }
  saveProfile(activeProfile,s);
  updateProfilesUI();
  if(win) {
    // Patch score into victory slide
    VICTORY_SLIDES[1].subline='FINAL SCORE: '+score;
    csTime=0;
    showCutscene(VICTORY_SLIDES, ()=>{ showEndOverlay(true); });
  } else {
    showEndOverlay(false);
  }
}

function showEndOverlay(win) {
  document.getElementById('onscreen-controls').classList.remove('visible');
  const overlay=document.getElementById('overlay');
  overlay.classList.remove('hidden');
  document.getElementById('startBtn').textContent=win?'PLAY AGAIN':'RETRY';
  if(win) {
    document.getElementById('winMsg').textContent='⭐ VICTORY!  Score: '+score;
    document.getElementById('deathMsg').textContent='';
  } else {
    document.getElementById('deathMsg').textContent='💀 You died in Dungeon '+dungeonLevel+'... Score: '+score;
    document.getElementById('winMsg').textContent='';
  }
}

// === MAIN LOOP ===
let lastT=0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastT)/1000, 0.05);
  lastT=ts;

  // Cutscene mode
  if(cs.active) {
    updateCutscene(dt);
    ctx.fillStyle='#000'; ctx.fillRect(0,0,CW,CH);
    renderCutscene(dt);
    return;
  }

  if(!gameRunning) return;

  // Update
  updatePlayer(dt);
  updateEnemies(dt);
  updateCompanion(dt);
  updateProjectiles(dt);
  updateParticles(dt);
  updateLoot(dt);
  updateCamera(dt);
  updateTransition(dt);

  // Bow cooldown UI
  const bowCdEl=document.getElementById('oc-bow-cd');
  if(bowCdEl) {
    const frac=Math.max(0,Math.min(1,bowTimer/3.0));
    const deg=Math.round(frac*360);
    bowCdEl.style.background=deg>0
      ? `conic-gradient(rgba(0,0,0,0.78) ${deg}deg, transparent ${deg}deg)`
      : 'none';
  }
  // Heal cooldown UI
  const healCdEl=document.getElementById('oc-heal-cd');
  if(healCdEl) {
    const frac=Math.max(0,Math.min(1,healPotionCd/HEAL_POTION_CD));
    const deg=Math.round(frac*360);
    healCdEl.style.background=deg>0
      ? `conic-gradient(rgba(0,0,0,0.78) ${deg}deg, transparent ${deg}deg)`
      : 'none';
  }
  // Bomb cooldown UI
  const bombCdEl=document.getElementById('oc-bomb-cd');
  if(bombCdEl) {
    const frac=Math.max(0,Math.min(1,bombCd/BOMB_CD));
    const deg=Math.round(frac*360);
    bombCdEl.style.background=deg>0
      ? `conic-gradient(rgba(0,0,0,0.78) ${deg}deg, transparent ${deg}deg)`
      : 'none';
  }

  // Render
  const shakeX=camera.shake>0?(Math.random()-0.5)*camera.shakeAmp:0;
  const shakeY=camera.shake>0?(Math.random()-0.5)*camera.shakeAmp:0;
  ctx.fillStyle='#111'; ctx.fillRect(0,0,CW,CH);
  ctx.save();
  ctx.translate(shakeX,shakeY);
  renderMap();
  renderLoot();
  renderEnemies();
  renderCompanion();
  renderPlayer();
  renderProjectiles();
  renderParticles();
  // Damage numbers (in world space, before restore)
  ctx.save();
  for(const n of dmgNumbers) {
    if(n.life<=0) continue;
    const alpha=Math.min(1, n.life*2);
    const sx=n.x-camera.x, sy=n.y-camera.y;
    ctx.globalAlpha=alpha;
    ctx.font=`bold ${n.big?18:14}px monospace`;
    ctx.fillStyle='#000';
    ctx.fillText(n.val, sx+1, sy+1);   // shadow
    ctx.fillStyle=n.color;
    ctx.fillText(n.val, sx, sy);
  }
  ctx.restore();
  ctx.restore();  // camera transform
  renderHUD();

  // Transition overlay
  if(transitioning&&transAlpha>0) {
    ctx.fillStyle=`rgba(0,0,0,${Math.min(transAlpha,1)})`;
    ctx.fillRect(0,0,CW,CH);
    if(transAlpha>0.4) {
      ctx.fillStyle='#ffd700'; ctx.font='bold 24px monospace';
      ctx.textAlign='center';
      ctx.fillText('DUNGEON '+(dungeonLevel)+'/'+cfg.maxLevels, CW/2, CH/2);
      ctx.fillStyle='#aaa'; ctx.font='14px monospace';
      ctx.fillText('Descending deeper...', CW/2, CH/2+30);
      ctx.textAlign='left';
    }
  }
}

requestAnimationFrame(loop);
</script>
<script>
// Refresh profile bars from localStorage and wire up buttons
(function(){
  function pfmt(sec){if(!sec)return'--:--';var m=Math.floor(sec/60),s=Math.floor(sec%60);return m+':'+(s<10?'0':'')+s;}
  for(var i=0;i<3;i++){
    var d=JSON.parse(localStorage.getItem('mcDungStats_'+i)||'{"wins":0,"bestTime":0,"runs":0}');
    document.getElementById('pstats'+i).innerHTML='BEATEN: '+d.wins+'&nbsp;&nbsp;BEST: '+pfmt(d.bestTime)+'<br>RUNS: '+d.runs;
    document.getElementById('pfill'+i).style.width=Math.min(100,d.wins/10*100)+'%';
  }
  var ap=parseInt(localStorage.getItem('mcDungActiveProfile')||'0');
  document.getElementById('prof'+ap).classList.add('active');
  // Use addEventListener — most reliable cross-scope binding
  document.getElementById('startBtn').addEventListener('click', function(){ startGame(); });
  for(var k=0;k<3;k++){
    (function(idx){
      document.getElementById('prof'+idx).addEventListener('click', function(){ selectProfile(idx); });
    })(k);
  }
})();
</script>
